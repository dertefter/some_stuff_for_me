name: Update Play Store Badges

on:
  schedule:
    # Запуск каждый день в 05:00 UTC (можно настроить любое время)
    - cron: '0 5 * * *'
  workflow_dispatch: # Позволяет запускать парсер вручную кнопкой

permissions:
  contents: write # Разрешаем боту сохранять SVG-файлы в ваш репозиторий

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4

    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Установка библиотек
      run: pip install google-play-scraper

    - name: Выполнение скрипта
      run: python main.py

    - name: Сохранение результатов в репозиторий
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.svg
        # Коммитим только если картинки изменились (например, изменился рейтинг или округлились скачивания)
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Автообновление бейджей" && git push)